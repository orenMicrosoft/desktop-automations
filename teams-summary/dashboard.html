<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Teams Summary</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--card-hover:#1e2240;--accent:#0f3460;--highlight:#e94560;--text:#e8e8f0;--muted:#7a829e;--border:#2a2d4a;--green:#4ade80;--yellow:#fbbf24;--blue:#60a5fa;--pill:#1a2744;--red:#ef4444;--orange:#f97316;--purple:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;display:flex;align-items:center;gap:10px;font-weight:600}
.header .actions{margin-left:auto;display:flex;gap:10px;align-items:center}
.header select,.header button{background:var(--accent);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:.85rem;transition:all .2s}
.header button:hover{background:var(--highlight);border-color:var(--highlight)}
.header button:disabled{opacity:.5;cursor:not-allowed}
.header .scan-status{font-size:.8rem;color:var(--muted);min-width:100px}

/* Sort toggle */
.sort-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.sort-toggle button{border:none;border-radius:0;border-right:1px solid var(--border);padding:7px 12px;font-size:.8rem}
.sort-toggle button:last-child{border-right:none}
.sort-toggle button.active{background:var(--highlight);color:#fff}

.kpi-strip{display:flex;gap:14px;padding:18px 28px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 22px;min-width:130px;flex:1;transition:transform .15s;cursor:pointer}
.kpi:hover{transform:translateY(-2px)}
.kpi .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.kpi .value{font-size:1.8rem;font-weight:700;margin-top:4px}
.kpi .sub{font-size:.72rem;color:var(--muted);margin-top:2px}

.main{display:grid;grid-template-columns:1fr 320px;gap:18px;padding:0 28px 28px;align-items:start}
@media(max-width:1000px){.main{grid-template-columns:1fr}}

.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.panel-title{padding:14px 18px;font-weight:600;font-size:.95rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-title .count{color:var(--muted);font-size:.8rem;font-weight:400}

/* Messages */
.msg-list{max-height:calc(100vh - 260px);overflow-y:auto}
.msg{padding:14px 18px;border-bottom:1px solid var(--border);transition:background .15s;position:relative}
.msg:hover{background:var(--card-hover)}
.msg:last-child{border-bottom:none}

/* Relevance badge */
.relevance-badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.badge-critical{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-action{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.badge-review{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.badge-mention{background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.badge-question{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.badge-info{background:rgba(122,130,158,.1);color:var(--muted);border:1px solid rgba(122,130,158,.2)}

/* Open in Teams button */
.teams-btn{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:var(--blue);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.73rem;cursor:pointer;white-space:nowrap;transition:all .2s;text-decoration:none;margin-left:auto;flex-shrink:0}
.teams-btn:hover{background:rgba(96,165,250,.15);border-color:var(--blue);text-decoration:none;color:#fff}
.teams-btn svg{width:14px;height:14px;fill:currentColor}

.msg .meta{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.msg .time{font-size:.73rem;color:var(--muted);white-space:nowrap}
.msg .sender{font-weight:600;font-size:.88rem;color:var(--text)}
.msg .subject{color:var(--yellow);font-size:.84rem;margin-top:4px;display:flex;align-items:center;gap:6px}
.msg .content{font-size:.84rem;color:var(--muted);margin-top:6px;line-height:1.5;word-break:break-word}
.msg .content em{color:var(--text);font-style:normal;background:rgba(96,165,250,.15);border-radius:2px;padding:0 2px}
.section-header{padding:10px 18px;background:rgba(15,52,96,.4);font-size:.78rem;font-weight:600;letter-spacing:.5px;color:var(--muted);position:sticky;top:0;z-index:1;backdrop-filter:blur(8px);display:flex;justify-content:space-between}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:16px}
.list-scroll{max-height:200px;overflow-y:auto}
.people-list,.subject-list,.links-list{padding:0;list-style:none}
.people-list li,.subject-list li,.links-list li{padding:8px 18px;font-size:.84rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.people-list li:hover,.subject-list li:hover,.links-list li:hover{background:var(--card-hover)}
.people-list li:last-child,.subject-list li:last-child,.links-list li:last-child{border-bottom:none}
.links-list li{word-break:break-all;font-size:.8rem}

.filter-bar{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.filter-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.85rem;transition:border-color .2s}
.filter-bar input:focus{outline:none;border-color:var(--blue)}
.filter-bar input::placeholder{color:var(--muted)}
.filter-bar .clear-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:4px 8px}
.filter-bar .clear-btn:hover{color:var(--text)}

.error-banner{background:rgba(233,69,96,.08);border:1px solid rgba(233,69,96,.3);border-radius:8px;padding:14px 18px;margin:18px 28px;color:var(--highlight);font-size:.9rem;display:flex;align-items:center;gap:10px}
.scanning-overlay{text-align:center;padding:40px;color:var(--muted)}
.scanning-overlay .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:.9rem;line-height:1.5}
.empty .icon{font-size:2rem;margin-bottom:8px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

.pill{display:inline-block;background:var(--pill);border-radius:12px;padding:2px 10px;font-size:.73rem;margin:1px 3px;border:1px solid var(--border)}
.link-icon{margin-right:4px;font-size:.85rem}

/* Legend bar */
.legend{display:flex;gap:12px;padding:6px 28px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
</style>
</head>
<body>

<div class="header">
  <h1>💬 Teams Summary</h1>
  <div class="actions">
    <select id="daysSelect">
      <option value="1">Last 24 hours</option>
      <option value="3" selected>Last 3 days</option>
      <option value="7">Last 7 days</option>
      <option value="14">Last 2 weeks</option>
    </select>
    <button id="refreshBtn" onclick="triggerScan()">🔄 Refresh</button>
    <span class="scan-status" id="scanStatus">Loading…</span>
  </div>
</div>

<div id="errorBanner"></div>

<div class="legend" id="legend" style="display:none">
  <span style="font-size:.75rem;font-weight:600;color:var(--muted)">Priority:</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>Critical</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span>Action needed</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>Review</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>Mention</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span>Question</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--muted)"></span>FYI</span>
  <span style="font-size:.72rem;color:var(--muted);margin-left:auto">↗ button opens message in Teams</span>
</div>

<div class="kpi-strip" id="kpis"></div>

<div class="main">
  <div class="panel" id="messagesPanel">
    <div class="panel-title">
      <span>Messages — sorted by relevance</span>
      <span class="count" id="msgCount"></span>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchBox" placeholder="🔍 Filter by name, subject, or content…" oninput="renderMessages()"/>
      <button class="clear-btn" onclick="document.getElementById('searchBox').value='';renderMessages()" title="Clear filter">✕</button>
    </div>
    <div class="msg-list" id="msgList">
      <div class="scanning-overlay">
        <div class="spinner"></div>
        <div>Loading scan data…</div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-title"><span>👥 People</span><span class="count" id="peopleCount"></span></div>
      <div class="list-scroll"><ul class="people-list" id="peopleList"></ul></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span>📌 Subjects</span><span class="count" id="subjectCount"></span></div>
      <div class="list-scroll"><ul class="subject-list" id="subjectList"></ul></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span>🔗 Links</span><span class="count" id="linkCount"></span></div>
      <div class="list-scroll"><ul class="links-list" id="linksList"></ul></div>
    </div>
  </div>
</div>

<script>
let DATA = null;
let SCANNING = false;

const BADGE_CONFIG = {
  critical: { icon: '🔴', label: 'Critical', css: 'badge-critical' },
  action:   { icon: '🟠', label: 'Action',   css: 'badge-action' },
  review:   { icon: '🟡', label: 'Review',   css: 'badge-review' },
  mention:  { icon: '🔵', label: 'Mention',  css: 'badge-mention' },
  question: { icon: '❓', label: 'Question', css: 'badge-question' },
  info:     { icon: '⚪', label: 'FYI',      css: 'badge-info' },
};

async function loadData() {
  try {
    const resp = await fetch('/api/scan-data');
    DATA = await resp.json();
    render();
  } catch (e) {
    document.getElementById('scanStatus').textContent = 'Failed to load';
  }
}

async function triggerScan() {
  const days = document.getElementById('daysSelect').value;
  const btn = document.getElementById('refreshBtn');
  const status = document.getElementById('scanStatus');
  btn.disabled = true;
  SCANNING = true;
  status.textContent = '⏳ Scanning…';
  document.getElementById('msgList').innerHTML = `
    <div class="scanning-overlay">
      <div class="spinner"></div>
      <div>Scanning Teams cache (${days} day${days > 1 ? 's' : ''})…</div>
      <div style="font-size:.75rem;margin-top:8px;color:var(--muted)">This may take 10-30 seconds</div>
    </div>`;
  try {
    await fetch(`/api/scan?days=${days}`, { method: 'POST' });
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      try {
        const scanResp = await fetch('/api/scanning');
        const scanStatus = await scanResp.json();
        if (!scanStatus.scanning || attempts > 90) {
          const resp = await fetch('/api/scan-data');
          const data = await resp.json();
          clearInterval(poll);
          DATA = data;
          SCANNING = false;
          render();
          btn.disabled = false;
          if (data.error) {
            status.textContent = '⚠️ Scan had issues';
          } else {
            const time = data.scanned_at ? new Date(data.scanned_at).toLocaleTimeString() : 'now';
            status.textContent = `✅ Scanned at ${time}`;
          }
        }
      } catch(e) {
        if (attempts > 90) {
          clearInterval(poll);
          btn.disabled = false;
          SCANNING = false;
          status.textContent = '❌ Scan timeout';
        }
      }
    }, 1000);
  } catch (e) {
    btn.disabled = false;
    SCANNING = false;
    status.textContent = '❌ Scan failed';
  }
}

function render() {
  if (!DATA) return;

  const banner = document.getElementById('errorBanner');
  banner.innerHTML = DATA.error
    ? `<div class="error-banner"><span>⚠️</span><span>${esc(DATA.error)}</span></div>`
    : '';

  if (!SCANNING) {
    const scannedAt = DATA.scanned_at ? new Date(DATA.scanned_at).toLocaleTimeString() : '—';
    document.getElementById('scanStatus').textContent = DATA.error ? `⚠️ ${scannedAt}` : `Last scan: ${scannedAt}`;
  }

  const msgs = DATA.messages || [];
  const people = DATA.people || [];
  const subjects = DATA.subjects || [];
  const links = DATA.links || [];

  // Count by relevance
  const counts = {};
  msgs.forEach(m => { const l = m.relevance_label || 'info'; counts[l] = (counts[l]||0) + 1; });
  const actionable = (counts.critical||0) + (counts.action||0) + (counts.review||0) + (counts.mention||0);

  document.getElementById('legend').style.display = msgs.length ? 'flex' : 'none';

  document.getElementById('kpis').innerHTML = `
    <div class="kpi" onclick="filterByLabel('')" title="Show all">
      <div class="label">Total Messages</div>
      <div class="value">${msgs.length}</div>
      <div class="sub">in cache</div>
    </div>
    <div class="kpi" onclick="filterByLabel('critical,action')" title="Filter critical + action" style="border-color:${actionable ? 'var(--orange)' : 'var(--border)'}">
      <div class="label">🔥 Needs Attention</div>
      <div class="value" style="color:${actionable ? 'var(--orange)' : 'var(--text)'}">${actionable}</div>
      <div class="sub">critical + action + review + mention</div>
    </div>
    <div class="kpi" onclick="filterByLabel('question')" title="Filter questions">
      <div class="label">❓ Questions</div>
      <div class="value">${counts.question||0}</div>
      <div class="sub">awaiting response</div>
    </div>
    <div class="kpi">
      <div class="label">👥 People</div>
      <div class="value">${people.length}</div>
      <div class="sub">${subjects.length} threads · ${links.length} links</div>
    </div>`;

  // Sidebar
  document.getElementById('peopleCount').textContent = people.length;
  document.getElementById('peopleList').innerHTML = people.length
    ? people.map(p => `<li onclick="filterBy('${esc(p)}')" title="Filter">${esc(p)}</li>`).join('')
    : '<li class="empty" style="padding:20px;text-align:center;cursor:default">No people found</li>';

  document.getElementById('subjectCount').textContent = subjects.length;
  document.getElementById('subjectList').innerHTML = subjects.length
    ? subjects.map(s => `<li onclick="filterBy('${esc(s).slice(0,30)}')" title="Filter">${esc(s)}</li>`).join('')
    : '<li class="empty" style="padding:20px;text-align:center;cursor:default">No subjects found</li>';

  document.getElementById('linkCount').textContent = links.length;
  document.getElementById('linksList').innerHTML = links.length
    ? links.slice(0,25).map(u => `<li>${linkIcon(u)}<a href="${esc(u)}" target="_blank">${shortenUrl(u)}</a></li>`).join('')
    : '<li class="empty" style="padding:20px;text-align:center;cursor:default">No links found</li>';

  renderMessages();
}

function filterBy(text) {
  document.getElementById('searchBox').value = text;
  renderMessages();
}

function filterByLabel(labels) {
  if (!labels) {
    document.getElementById('searchBox').value = '';
  } else {
    document.getElementById('searchBox').value = ':' + labels;
  }
  renderMessages();
}

function renderMessages() {
  const container = document.getElementById('msgList');
  const countEl = document.getElementById('msgCount');
  if (!DATA || !DATA.messages) return;

  const rawFilter = (document.getElementById('searchBox').value || '').trim();
  let labelFilter = null;
  let textFilter = '';

  // Special filter: ":critical,action" filters by relevance label
  if (rawFilter.startsWith(':')) {
    labelFilter = rawFilter.slice(1).split(',').map(s => s.trim().toLowerCase());
  } else {
    textFilter = rawFilter.toLowerCase();
  }

  const msgs = DATA.messages.filter(m => {
    if (labelFilter) {
      const ml = m.relevance_label || 'info';
      // "critical,action" should also match review and mention for the "Needs Attention" KPI
      const expanded = labelFilter.includes('critical') && labelFilter.includes('action')
        ? [...labelFilter, 'review', 'mention']
        : labelFilter;
      return expanded.includes(ml);
    }
    if (!textFilter) return true;
    const haystack = [
      m.time, m.subject || '', m.relevance_label || '',
      ...(m.senders || []),
      ...(m.content || [])
    ].join(' ').toLowerCase();
    return haystack.includes(textFilter);
  });

  countEl.textContent = `${msgs.length} of ${DATA.messages.length}`;

  if (!msgs.length) {
    if (!DATA.messages.length) {
      container.innerHTML = `
        <div class="empty">
          <div class="icon">📭</div>
          <div>No messages found in the cache.</div>
          <div style="font-size:.8rem;margin-top:8px">Try a wider date range or make sure Teams is running.</div>
        </div>`;
    } else {
      container.innerHTML = '<div class="empty"><div class="icon">🔍</div>No messages match your filter</div>';
    }
    return;
  }

  // Group messages by relevance tier
  const tiers = [
    { labels: ['critical'], title: '🔴 Critical — Immediate attention needed', msgs: [] },
    { labels: ['action'],   title: '🟠 Action Required', msgs: [] },
    { labels: ['review'],   title: '🟡 Review Requests', msgs: [] },
    { labels: ['mention'],  title: '🔵 You were mentioned', msgs: [] },
    { labels: ['question'], title: '❓ Questions', msgs: [] },
    { labels: ['info'],     title: '⚪ Informational', msgs: [] },
  ];

  msgs.forEach(m => {
    const label = m.relevance_label || 'info';
    const tier = tiers.find(t => t.labels.includes(label));
    if (tier) tier.msgs.push(m);
  });

  let html = '';
  tiers.forEach(tier => {
    if (!tier.msgs.length) return;
    html += `<div class="section-header"><span>${tier.title}</span><span>${tier.msgs.length}</span></div>`;
    tier.msgs.forEach(m => {
      const badge = BADGE_CONFIG[m.relevance_label || 'info'];
      const time = formatTime(m.time);
      const day = formatDayShort(m.time);
      const senders = (m.senders || []).map(s => `<span class="pill">${esc(s)}</span>`).join(' ')
        || '<span style="color:var(--muted)">Unknown</span>';
      const teamsBtn = m.teams_link
        ? `<a class="teams-btn" href="${esc(m.teams_link)}" target="_blank" title="Open in Teams" onclick="event.stopPropagation()">↗ Teams</a>`
        : '';

      html += `<div class="msg">`;
      html += `<div class="meta">`;
      html += `<span class="relevance-badge ${badge.css}">${badge.icon} ${badge.label}</span>`;
      html += `<span class="time">${day} ${time}</span>`;
      html += `<span class="sender">${senders}</span>`;
      html += teamsBtn;
      html += `</div>`;
      if (m.subject) html += `<div class="subject"><span>📌</span> ${esc(m.subject)}</div>`;
      if (m.content && m.content.length) {
        html += `<div class="content">${m.content.map(c => highlightFilter(esc(c.slice(0, 300)), textFilter)).join('<br/>')}</div>`;
      }
      html += '</div>';
    });
  });

  container.innerHTML = html;
}

function highlightFilter(text, filter) {
  if (!filter || filter.length < 2) return text;
  const escaped = filter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<em>$1</em>');
}

function formatTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch { return iso.slice(11, 16); }
}

function formatDayShort(iso) {
  if (!iso) return '';
  const dayStr = iso.slice(0, 10);
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const yest = new Date(now - 86400000).toISOString().slice(0,10);
  if (dayStr === today) return 'Today';
  if (dayStr === yest) return 'Yesterday';
  const d = new Date(dayStr + 'T12:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
}

function linkIcon(u) {
  if (u.includes('pullrequest')) return '<span class="link-icon">🔀</span>';
  if (u.includes('_build')) return '<span class="link-icon">🏗️</span>';
  if (u.includes('workitems') || u.includes('_work')) return '<span class="link-icon">📋</span>';
  if (u.includes('github.com')) return '<span class="link-icon">🐙</span>';
  if (u.includes('_git')) return '<span class="link-icon">📁</span>';
  return '<span class="link-icon">🔗</span>';
}

function shortenUrl(u) {
  try {
    const url = new URL(u);
    let path = url.pathname;
    if (path.includes('pullrequest')) return 'PR ' + path.split('pullrequest/').pop();
    if (path.includes('_build')) return 'Build ' + (url.searchParams.get('buildId') || url.searchParams.get('definitionId') || path.split('/').pop());
    if (path.includes('workitems')) return 'Work Item ' + path.split('/').pop();
    if (path.includes('_git')) return path.split('_git/').pop().split('/').slice(0,2).join('/');
    return url.hostname.replace('dev.azure.com','ADO') + path.slice(0, 45);
  } catch { return u.slice(0, 65); }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadData();
</script>
</body>
</html>
