<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Teams Summary</title>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--highlight:#e94560;--text:#eee;--muted:#8892b0;--border:#233554;--green:#4ade80;--yellow:#fbbf24;--blue:#60a5fa;--pill:#0f3460}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;display:flex;align-items:center;gap:8px}
.header .actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.header select,.header button{background:var(--accent);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:.85rem}
.header button:hover{background:var(--highlight)}
.header .scan-status{font-size:.8rem;color:var(--muted)}

/* KPI strip */
.kpi-strip{display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 20px;min-width:140px;flex:1}
.kpi .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:1.6rem;font-weight:700;margin-top:4px}

/* Layout */
.main{display:grid;grid-template-columns:1fr 320px;gap:16px;padding:0 24px 24px;align-items:start}
@media(max-width:900px){.main{grid-template-columns:1fr}}

/* Messages list */
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-title{padding:12px 16px;font-weight:600;font-size:.95rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.msg-list{max-height:calc(100vh - 250px);overflow-y:auto}
.msg{padding:12px 16px;border-bottom:1px solid var(--border);cursor:default;transition:background .15s}
.msg:hover{background:rgba(255,255,255,.04)}
.msg .time{font-size:.75rem;color:var(--muted)}
.msg .sender{font-weight:600;font-size:.9rem;margin-top:2px}
.msg .subject{color:var(--yellow);font-size:.85rem;margin-top:3px}
.msg .content{font-size:.85rem;color:var(--muted);margin-top:4px;line-height:1.4;word-break:break-word}
.msg .content em{color:var(--text);font-style:normal}
.day-header{padding:8px 16px;background:var(--accent);font-size:.8rem;font-weight:600;letter-spacing:.5px;color:var(--muted);position:sticky;top:0;z-index:1}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:16px}
.people-list,.subject-list,.links-list{padding:0;list-style:none}
.people-list li,.subject-list li,.links-list li{padding:6px 16px;font-size:.85rem;border-bottom:1px solid var(--border)}
.people-list li:last-child,.subject-list li:last-child,.links-list li:last-child{border-bottom:none}
.links-list li{word-break:break-all;font-size:.8rem}

/* Filter bar */
.filter-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px}
.filter-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:.85rem}
.filter-bar input::placeholder{color:var(--muted)}

/* Error / empty */
.empty{padding:40px 20px;text-align:center;color:var(--muted)}
.error{color:var(--highlight);padding:16px;text-align:center}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Pill tags */
.pill{display:inline-block;background:var(--pill);border-radius:10px;padding:1px 8px;font-size:.75rem;margin:1px 2px}
</style>
</head>
<body>

<div class="header">
  <h1>💬 Teams Summary</h1>
  <div class="actions">
    <select id="daysSelect">
      <option value="1">Last 1 day</option>
      <option value="3" selected>Last 3 days</option>
      <option value="7">Last 7 days</option>
    </select>
    <button id="refreshBtn" onclick="triggerScan()">🔄 Refresh</button>
    <span class="scan-status" id="scanStatus">Loading…</span>
  </div>
</div>

<div class="kpi-strip" id="kpis"></div>

<div class="main">
  <div class="panel" id="messagesPanel">
    <div class="panel-title">
      <span>Recent Messages</span>
      <span id="msgCount" style="color:var(--muted);font-size:.8rem"></span>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchBox" placeholder="Filter messages…" oninput="renderMessages()"/>
    </div>
    <div class="msg-list" id="msgList">
      <div class="empty">Click <b>Refresh</b> to scan your Teams cache</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">👥 People</div>
      <ul class="people-list" id="peopleList"></ul>
    </div>
    <div class="panel">
      <div class="panel-title">📌 Subjects</div>
      <ul class="subject-list" id="subjectList"></ul>
    </div>
    <div class="panel">
      <div class="panel-title">🔗 Links</div>
      <ul class="links-list" id="linksList"></ul>
    </div>
  </div>
</div>

<script>
let DATA = null;

async function loadData() {
  try {
    const resp = await fetch('/api/scan-data');
    DATA = await resp.json();
    render();
  } catch (e) {
    document.getElementById('scanStatus').textContent = 'Failed to load';
  }
}

async function triggerScan() {
  const days = document.getElementById('daysSelect').value;
  const btn = document.getElementById('refreshBtn');
  const status = document.getElementById('scanStatus');
  btn.disabled = true;
  status.textContent = 'Scanning…';
  try {
    await fetch(`/api/scan?days=${days}`, { method: 'POST' });
    // Poll until new data appears
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      try {
        const resp = await fetch('/api/scan-data');
        const data = await resp.json();
        if (data && !data.error?.includes('No scan yet') && data.scanned_at !== DATA?.scanned_at) {
          clearInterval(poll);
          DATA = data;
          render();
          btn.disabled = false;
          status.textContent = `Scanned ${new Date(data.scanned_at).toLocaleTimeString()}`;
        } else if (attempts > 60) {
          clearInterval(poll);
          btn.disabled = false;
          status.textContent = 'Scan timeout';
        }
      } catch(e) {}
    }, 1000);
  } catch (e) {
    btn.disabled = false;
    status.textContent = 'Scan failed';
  }
}

function render() {
  if (!DATA) return;
  if (DATA.error) {
    document.getElementById('msgList').innerHTML = `<div class="error">${esc(DATA.error)}</div>`;
    document.getElementById('scanStatus').textContent = 'Error';
    return;
  }

  const scannedAt = DATA.scanned_at ? new Date(DATA.scanned_at).toLocaleTimeString() : '—';
  document.getElementById('scanStatus').textContent = `Last scan: ${scannedAt}`;

  // KPIs
  const kpis = document.getElementById('kpis');
  kpis.innerHTML = `
    <div class="kpi"><div class="label">Messages</div><div class="value">${DATA.messages.length}</div></div>
    <div class="kpi"><div class="label">People</div><div class="value">${DATA.people.length}</div></div>
    <div class="kpi"><div class="label">Subjects</div><div class="value">${DATA.subjects.length}</div></div>
    <div class="kpi"><div class="label">Shared Links</div><div class="value">${DATA.links.length}</div></div>
  `;

  // Sidebar: People
  const pl = document.getElementById('peopleList');
  pl.innerHTML = DATA.people.map(p => `<li>${esc(p)}</li>`).join('') || '<li class="empty">None</li>';

  // Sidebar: Subjects
  const sl = document.getElementById('subjectList');
  sl.innerHTML = DATA.subjects.map(s => `<li>${esc(s)}</li>`).join('') || '<li class="empty">None</li>';

  // Sidebar: Links
  const ll = document.getElementById('linksList');
  ll.innerHTML = DATA.links.slice(0, 20).map(u => `<li><a href="${esc(u)}" target="_blank">${shortenUrl(u)}</a></li>`).join('') || '<li class="empty">None</li>';

  renderMessages();
}

function renderMessages() {
  const container = document.getElementById('msgList');
  const countEl = document.getElementById('msgCount');
  if (!DATA || !DATA.messages) return;

  const filter = (document.getElementById('searchBox').value || '').toLowerCase();
  const msgs = DATA.messages.filter(m => {
    if (!filter) return true;
    const haystack = [
      m.time, m.subject || '',
      ...(m.senders || []),
      ...(m.content || [])
    ].join(' ').toLowerCase();
    return haystack.includes(filter);
  });

  countEl.textContent = `${msgs.length} shown`;

  if (!msgs.length) {
    container.innerHTML = '<div class="empty">No messages match your filter</div>';
    return;
  }

  // Group by day
  const byDay = {};
  msgs.forEach(m => {
    const day = m.time.slice(0, 10);
    (byDay[day] = byDay[day] || []).push(m);
  });

  let html = '';
  Object.keys(byDay).sort().reverse().forEach(day => {
    const dayLabel = formatDay(day);
    html += `<div class="day-header">${dayLabel} (${byDay[day].length})</div>`;
    byDay[day].forEach(m => {
      const time = m.time.slice(11, 19);
      const senders = (m.senders || []).join(', ') || '—';
      html += `<div class="msg">`;
      html += `<div class="time">${time} UTC</div>`;
      html += `<div class="sender">${esc(senders)}</div>`;
      if (m.subject) html += `<div class="subject">📌 ${esc(m.subject)}</div>`;
      if (m.content && m.content.length) {
        html += `<div class="content">${m.content.map(c => esc(c.slice(0, 250))).join('<br/>')}</div>`;
      }
      html += '</div>';
    });
  });

  container.innerHTML = html;
}

function formatDay(iso) {
  const d = new Date(iso + 'T00:00:00Z');
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const yest = new Date(now - 86400000).toISOString().slice(0,10);
  if (iso === today) return 'Today';
  if (iso === yest) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', timeZone: 'UTC' });
}

function shortenUrl(u) {
  try {
    const url = new URL(u);
    let path = url.pathname;
    // Shorten ADO URLs
    if (path.includes('pullrequest')) return '🔀 PR ' + path.split('pullrequest/').pop();
    if (path.includes('_build')) return '🏗️ Build ' + (url.searchParams.get('buildId') || url.searchParams.get('definitionId') || '');
    if (path.includes('workitems')) return '📋 Work Item ' + path.split('/').pop();
    if (path.includes('_git')) return '📁 ' + path.split('_git/').pop().split('/')[0];
    return url.hostname + path.slice(0, 40);
  } catch { return u.slice(0, 60); }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Load on start
loadData();
</script>
</body>
</html>
